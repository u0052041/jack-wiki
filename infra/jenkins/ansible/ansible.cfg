# Ansible 的全域設定檔，讓你不用每次下指令都加一堆參數
# 執行 ansible-playbook 時會自動讀這個檔

[defaults]
# inventory 預設路徑，省去每次加 -i inventory.ini
inventory = inventory.ini

# SSH 連線用的 private key
private_key_file = ~/.ssh/jenkins-key

# EC2 預設登入 user（Amazon Linux 是 ec2-user）
remote_user = ec2-user

# 不檢查 host key，避免第一次連線卡住（新開的 EC2 沒有舊 fingerprint）
host_key_checking = False
