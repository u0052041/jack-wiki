# group_vars/all.yml — 所有 host 共用的變數
# 在這裡定義的變數可以在所有 role 的 task 裡直接用

# Jenkins Docker image 版本（與 variables.tf 保持一致）
jenkins_image: "jenkins/jenkins:2.541.3-lts"

# Jenkins data 掛載路徑（對應 EBS volume）
jenkins_data_dir: "/mnt/jenkins-data"

# Jenkins container 對外 port
jenkins_http_port: 8080
jenkins_agent_port: 50000

aws_region: "ap-northeast-1"

# Cloudflare Tunnel token 從 AWS SSM 拿
# 實際值不寫在這裡，由 cloudflared role 的 task 去抓
cloudflare_ssm_param: "/jenkins/cloudflare-tunnel-token"
