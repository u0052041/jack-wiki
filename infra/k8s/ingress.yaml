apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-app
  namespace: default
  annotations:
    # ── ALB 基礎 ──
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: main
    alb.ingress.kubernetes.io/group.order: "100"

    # ── HTTPS ──
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # deploy 時自動注入：export WILDCARD_CERT_ARN=$(aws ssm get-parameter --name /shared/wildcard-cert-arn --query Parameter.Value --output text)
    # envsubst < ingress.yaml | kubectl apply -f -
    alb.ingress.kubernetes.io/certificate-arn: ${WILDCARD_CERT_ARN}
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06

    # ── Health Check ──
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    alb.ingress.kubernetes.io/success-codes: "200"

    # ── Tags ──
    alb.ingress.kubernetes.io/tags: Environment=prod,ManagedBy=alb-controller
spec:
  ingressClassName: alb
  rules:
    - host: app.u0052041.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: test-app
                port:
                  number: 80
